<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<div class="noise" aria-hidden="true"></div>

<main class="shell">
  <section class="hero">
    <div class="tag"><span class="dot"></span> Fast route, clean links</div>
    <h1>Transforme un lien long en URL courte, nette, partageable.</h1>
    <p>
      Une interface plus éditoriale, une action plus directe. Colle ton URL,
      récupère le slug, et partage en une seconde.
    </p>
    <div class="mini-grid">
      <div class="mini-card">
        <div class="mini-label">Dans la liste</div>
        <div class="mini-value" id="today-count">--</div>
      </div>
      <div class="mini-card">
        <div class="mini-label">Total affiché</div>
        <div class="mini-value" id="total-count">0</div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="top-row">
      <div class="section-title">Nouveau lien</div>
      <div class="counter-pill" id="links-counter">0 liens</div>
    </div>

    <div class="card">
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://exemple.com/un-lien-vraiment-tres-long"/>
        <button id="submit-btn" class="submit-btn">Raccourcir</button>
      </div>
      <div class="error-box" id="error-box"></div>
      <div class="result hidden" id="result">
        <span class="result-url" id="result-url"></span>
        <button class="copy-btn" id="copy-btn">Copier</button>
      </div>
    </div>

    <div class="section-title" style="margin-bottom: 10px;">Liens créés</div>
    <div id="links-list" class="links-list">
      <div class="empty">Aucun lien pour l'instant</div>
    </div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
